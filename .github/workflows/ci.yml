name: CI

on:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system ".[dev]"

      - name: Lint
        run: ruff check src tests eval scripts

      - name: Format check
        run: ruff format --check src tests eval scripts

      - name: Type check
        run: mypy src/overbuild

      - name: Unit tests
        run: pytest -v --tb=short
